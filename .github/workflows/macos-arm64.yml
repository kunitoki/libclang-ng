name: macos-arm64

on:
  push:
    branches:
      - master
      - "dev/**"
    tags:
      - "v*"
    paths:
      - ".github/workflows/macos-arm64.yml"
      - "python/clang/**/*.py"
      - "scripts/*-macos-arm64.sh"
      - "scripts/download-llvm.sh"
      - "scripts/update-python.sh"
      - "hatch_build.py"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches:
      - "dev/**"
    paths:
      - ".github/workflows/macos-arm64.yml"
      - "python/clang/**/*.py"
      - "scripts/*-macos-arm64.sh"
      - "scripts/download-llvm.sh"
      - "scripts/update-python.sh"
      - "hatch_build.py"
      - "pyproject.toml"
      - "uv.lock"

env:
  MACOSX_DEPLOYMENT_TARGET: "11.0"

concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    runs-on: macos-latest
    outputs:
      llvm_ver: ${{ steps.version.outputs.llvm_ver }}

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: install uv
      uses: astral-sh/setup-uv@v8.0.0

    - name: install dependencies
      run: brew install gnu-tar gcc@14

    - name: get llvm version
      id: version
      run: |
        VER=$(uv run python -c "import sys; sys.path.insert(0, 'python'); from clang import __version__; print(__version__)")
        echo "LLVM_VER=$VER" >> $GITHUB_ENV
        echo "llvm_ver=$VER" >> $GITHUB_OUTPUT

    - name: restore cached libclang
      id: cache-libclang
      uses: actions/cache/restore@v5
      with:
        path: build/llvm/cmake-build/lib/libclang.dylib.${{ steps.version.outputs.llvm_ver }}.macos-arm64.tar.gz
        key: libclang.dylib.${{ steps.version.outputs.llvm_ver }}.macos-arm64.tar.gz

    - name: get llvm-project
      run: sh scripts/download-llvm.sh

    - name: update python bindings
      run: sh scripts/update-python.sh

    - name: cmake & build
      if: steps.cache-libclang.outputs.cache-hit != 'true'
      run: sh scripts/build-macos-arm64.sh

    - name: create archive of libclang.dylib
      if: steps.cache-libclang.outputs.cache-hit != 'true'
      run: |
        cd build/llvm/cmake-build/lib
        gtar zcvf libclang.dylib.$LLVM_VER.macos-arm64.tar.gz libclang.dylib

    - uses: actions/cache/save@v5
      if: steps.cache-libclang.outputs.cache-hit != 'true'
      with:
        key: libclang.dylib.${{ steps.version.outputs.llvm_ver }}.macos-arm64.tar.gz
        path: build/llvm/cmake-build/lib/libclang.dylib.${{ steps.version.outputs.llvm_ver }}.macos-arm64.tar.gz

    - name: extract libclang from cached archive
      if: steps.cache-libclang.outputs.cache-hit == 'true'
      run: gtar zxvf build/llvm/cmake-build/lib/libclang.dylib.$LLVM_VER.macos-arm64.tar.gz -C build/llvm/cmake-build/lib

    - name: generate wheel package
      run: |
        mkdir -p build/src/clang/native
        cp build/llvm/cmake-build/lib/libclang.dylib build/src/clang/native/
        WHEEL_PLAT_NAME=macosx_11_0_arm64 uv build --wheel

    - uses: actions/upload-artifact@v7
      with:
        name: wheel-${{ steps.version.outputs.llvm_ver }}-macosx_11_0_arm64
        path: dist/*.whl
        compression-level: 0

  upload-to-pypi:
    name: publish to pypi
    runs-on: ubuntu-latest
    needs: [build-and-deploy]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')

    steps:
    - uses: actions/download-artifact@v8
      with:
        name: wheel-${{ needs.build-and-deploy.outputs.llvm_ver }}-macosx_11_0_arm64
        path: dist/

    - name: publish to pypi
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist/
        verbose: true
        print-hash: true
        password: ${{ secrets.PYPI_API_TOKEN }}
        skip-existing: true
